<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>moond — about</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --ink: #0d0d0f; --paper: #f4f0ea; --moon: #c8b89a; --accent: #7a6652; }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }


    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 10;
    }

    nav {
      position: fixed;
      top: 2rem;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      z-index: 20;
      opacity: 0;
      animation: fadein 1s ease 0.5s forwards;
    }
    nav a {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: rgba(200,184,154,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }
    nav a:hover, nav a.active { color: rgba(200,184,154,1); }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 90vw;
      padding: 2rem;
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadein { to { opacity: 1; } }

    .page-title {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--paper);
      text-transform: lowercase;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--moon);
      margin: 1.4rem auto;
      opacity: 0;
      animation: fadein 1s ease 0.9s forwards;
    }

    .bio {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 300;
      color: rgba(244,240,234,0.55);
      line-height: 1.9;
      letter-spacing: 0.04em;
      max-width: 380px;
      opacity: 0;
      animation: fadein 1s ease 1.1s forwards;
    }

    .bio .placeholder {
      color: rgba(200,184,154,0.25);
      font-style: italic;
    }

    .facts {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      opacity: 0;
      animation: fadein 1s ease 1.4s forwards;
      width: 100%;
      max-width: 320px;
    }

    .fact {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid rgba(200,184,154,0.08);
      padding-bottom: 0.9rem;
    }

    .fact-label {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(200,184,154,0.4);
    }

    .fact-value {
      font-size: 0.85rem;
      color: rgba(244,240,234,0.5);
      font-style: italic;
    }

    .fact-value.placeholder {
      color: rgba(200,184,154,0.2);
    }
  </style>
</head>
<body>
 

  <nav>
    <a href="index.html">home</a>
    <a href="about.html" class="active">about</a>
  </nav>

  <div class="scene">
    <div class="card">
      <div class="page-title">about</div>
      <div class="divider"></div>

      <p class="bio">
        <span class="placeholder">— your story goes here. a line or two is enough. —</span>
      </p>

      <div class="facts">
        <div class="fact">
          <span class="fact-label">based in</span>
          <span class="fact-value placeholder">somewhere</span>
        </div>
        <div class="fact">
          <span class="fact-label">doing</span>
          <span class="fact-value placeholder">something</span>
        </div>
        <div class="fact">
          <span class="fact-label">into</span>
          <span class="fact-value placeholder">everything & nothing</span>
        </div>
        <div class="fact">
          <span class="fact-label">age</span>
          <span class="fact-value">24</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
