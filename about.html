<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>moond — about</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --ink: #0d0d0f; --paper: #f4f0ea; --moon: #c8b89a; --accent: #7a6652; }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #wave-bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 10;
    }

    nav {
      position: fixed;
      top: 2rem;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      z-index: 20;
      opacity: 0;
      animation: fadein 1s ease 0.5s forwards;
    }
    nav a {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: rgba(200,184,154,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }
    nav a:hover, nav a.active { color: rgba(200,184,154,1); }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 90vw;
      padding: 2rem;
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadein { to { opacity: 1; } }

    .page-title {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--paper);
      text-transform: lowercase;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--moon);
      margin: 1.4rem auto;
      opacity: 0;
      animation: fadein 1s ease 0.9s forwards;
    }

    .bio {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 300;
      color: rgba(244,240,234,0.55);
      line-height: 1.9;
      letter-spacing: 0.04em;
      max-width: 380px;
      opacity: 0;
      animation: fadein 1s ease 1.1s forwards;
    }

    .bio .placeholder {
      color: rgba(200,184,154,0.25);
      font-style: italic;
    }

    .facts {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      opacity: 0;
      animation: fadein 1s ease 1.4s forwards;
      width: 100%;
      max-width: 320px;
    }

    .fact {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid rgba(200,184,154,0.08);
      padding-bottom: 0.9rem;
    }

    .fact-label {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(200,184,154,0.4);
    }

    .fact-value {
      font-size: 0.85rem;
      color: rgba(244,240,234,0.5);
      font-style: italic;
    }

    .fact-value.placeholder {
      color: rgba(200,184,154,0.2);
    }
  </style>
</head>
<body>
  <canvas id="wave-bg"></canvas>

  <nav>
    <a href="index.html">home</a>
    <a href="about.html" class="active">about</a>
  </nav>

  <div class="scene">
    <div class="card">
      <div class="page-title">about</div>
      <div class="divider"></div>

      <p class="bio">
        <span class="placeholder">— your story goes here. a line or two is enough. —</span>
      </p>

      <div class="facts">
        <div class="fact">
          <span class="fact-label">based in</span>
          <span class="fact-value placeholder">somewhere</span>
        </div>
        <div class="fact">
          <span class="fact-label">doing</span>
          <span class="fact-value placeholder">something</span>
        </div>
        <div class="fact">
          <span class="fact-label">into</span>
          <span class="fact-value placeholder">everything & nothing</span>
        </div>
        <div class="fact">
          <span class="fact-label">age</span>
          <span class="fact-value">24</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('wave-bg');
    const ctx = canvas.getContext('2d');
    const PERIOD = 120, AMPLITUDE = 70;

    const stars = Array.from({ length: 180 }, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.2 + 0.2,
      o: Math.random() * 0.5 + 0.1,
      bright: Math.random() > 0.85
    }));

    let dpr = 1;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }

    function getWaveY(xVal, originY) {
      return originY - AMPLITUDE * Math.exp(-xVal / 220) * Math.sin((2 * Math.PI * xVal) / PERIOD);
    }

    function draw() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);

      const originY = H * 0.72;
      const xScale = W / 150;

      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.bright
          ? `rgba(255,248,220,${s.o + 0.3})`
          : `rgba(220,220,235,${s.o})`;
        ctx.fill();
      });

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(200,184,154,0.18)';
      ctx.lineWidth = 1;
      for (let px = 0; px <= W; px++) {
        const y = getWaveY(px / xScale, originY);
        px === 0 ? ctx.moveTo(px, y) : ctx.lineTo(px, y);
      }
      ctx.stroke();

      const t = Date.now() / 1000;
      const xVal = (t * 12) % 150;
      const dotX = xVal * xScale;
      const dotY = getWaveY(xVal, originY);
      const pulse = Math.sin(t * 3) * 0.5 + 0.5;

      const halo = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, 5 + pulse * 2);
      halo.addColorStop(0,   `rgba(220,235,255,${0.6 + pulse * 0.2})`);
      halo.addColorStop(0.5, `rgba(200,220,245,${0.2 + pulse * 0.1})`);
      halo.addColorStop(1,   'rgba(190,210,240,0)');
      ctx.beginPath();
      ctx.arc(dotX, dotY, 5 + pulse * 2, 0, Math.PI * 2);
      ctx.fillStyle = halo;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(dotX, dotY, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240,248,255,1)';
      ctx.fill();

      const rayLen = 2.5 + pulse * 1.5;
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(dotX + Math.cos(angle) * 2.5, dotY + Math.sin(angle) * 2.5);
        ctx.lineTo(dotX + Math.cos(angle) * (2.5 + rayLen), dotY + Math.sin(angle) * (2.5 + rayLen));
        ctx.strokeStyle = `rgba(210,230,255,${0.55 + pulse * 0.3})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
