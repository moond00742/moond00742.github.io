<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>moond</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #0d0d0f;
      --paper: #f4f0ea;
      --moon: #c8b89a;
      --accent: #7a6652;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #wave-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 10;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .card {
      position: relative;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90vw;
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .name {
      font-family: Arial, sans-serif;
      font-size: clamp(4rem, 14vw, 7.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--paper);
      line-height: 0.9;
      text-transform: lowercase;
      display: inline-block;
    }

    .name::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: var(--moon);
      margin: 1.4rem auto 0;
      opacity: 0;
      animation: fadein 1s ease 1.4s forwards;
    }

    @keyframes fadein {
      to { opacity: 1; }
    }

    .tagline {
      font-family: Arial, sans-serif;
      font-size: clamp(0.6rem, 2vw, 0.72rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--moon);
      margin-top: 1.6rem;
      opacity: 0;
      animation: fadein 1s ease 1.7s forwards;
    }

    .quote-wrap {
      margin-top: 3rem;
      opacity: 0;
      animation: fadein 1s ease 2.1s forwards;
    }

    .quote {
      font-family: Arial, sans-serif;
      font-size: clamp(1rem, 3vw, 1.1rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(244, 240, 234, 0.55);
      line-height: 1.7;
      padding: 0 1.2rem;
    }

    .quote::before,
    .quote::after {
      font-style: normal;
      font-size: 1.2rem;
      line-height: 0;
      vertical-align: -0.4em;
      color: var(--accent);
      opacity: 0.6;
    }
    .quote::before { content: '\201C'; margin-right: 0.1em; }
    .quote::after  { content: '\201D'; margin-left: 0.1em; }
  </style>
</head>
<body>

  <canvas id="wave-bg"></canvas>

  <div class="scene">
    <div class="card">
      <div class="name">moond</div>
      <p class="tagline">welcome to my world</p>
      <div class="quote-wrap">
        <p class="quote">stay hungry, stay foolish</p>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('wave-bg');
    const ctx = canvas.getContext('2d');
    const AGE = 24;
    const PERIOD = 120;
    const AMPLITUDE = 80;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    const stars = Array.from({ length: 60 }, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 0.8 + 0.3,
  o: Math.random() * 0.4 + 0.1
}));
    
    function draw() {
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => {
  ctx.beginPath();
  ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(220, 220, 230, ${s.o})`;
  ctx.fill();
});

      const originY = H * 0.72;
      const xScale = W / 150;
      const ageX = AGE * xScale;
      const ageDecay = Math.exp(-AGE / 200);
      const ageY = originY - AMPLITUDE * ageDecay * Math.sin((2 * Math.PI * AGE) / PERIOD);

      // Wave line
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(200, 184, 154, 0.18)';
      ctx.lineWidth = 1.5;
      for (let px = 0; px <= W; px++) {
        const xVal = px / xScale;
        const decay = Math.exp(-xVal / 200);
        const y = originY - AMPLITUDE * decay * Math.sin((2 * Math.PI * xVal) / PERIOD);
        px === 0 ? ctx.moveTo(px, y) : ctx.lineTo(px, y);
      }
      ctx.stroke();

     // Moving shining dot
const t = Date.now() / 1000;
const offsetY = Math.sin(t * 1.5) * 6;
const pulse = Math.sin(t * 2) * 0.5 + 0.5;
const r1 = 3 + pulse * 2;
const r3 = 20 + pulse * 12;

const grad = ctx.createRadialGradient(ageX, ageY + offsetY, 0, ageX, ageY + offsetY, r3);
grad.addColorStop(0,    'rgba(255, 245, 200, 1)');
grad.addColorStop(0.2,  'rgba(220, 210, 180, 0.7)');
grad.addColorStop(0.5,  `rgba(200, 195, 170, ${0.25 + pulse * 0.1})`);
grad.addColorStop(1,    'rgba(200, 190, 160, 0)');
ctx.beginPath();
ctx.arc(ageX, ageY + offsetY, r3, 0, Math.PI * 2);
ctx.fillStyle = grad;
ctx.fill();

ctx.beginPath();
ctx.arc(ageX, ageY + offsetY, r1, 0, Math.PI * 2);
ctx.fillStyle = `rgba(255, 252, 230, ${0.92 + pulse * 0.08})`;
ctx.fill();

for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const len = i % 2 === 0 ? (7 + pulse * 5) : (4 + pulse * 3);
  ctx.beginPath();
  ctx.moveTo(ageX + Math.cos(angle) * (r1 + 1), ageY + offsetY + Math.sin(angle) * (r1 + 1));
  ctx.lineTo(ageX + Math.cos(angle) * (r1 + len), ageY + offsetY + Math.sin(angle) * (r1 + len));
  ctx.strokeStyle = `rgba(255, 228, 150, ${0.45 + pulse * 0.35})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
